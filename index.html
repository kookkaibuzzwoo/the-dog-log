<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Dog Log 🐕</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Sheets sync via Apps Script (replaces Firebase) -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #F6EFE3;
      background-image: radial-gradient(rgba(160,130,90,.09) 1px, transparent 1px);
      background-size: 22px 22px;
      color: #5C4E3E;
    }
    .font-hand { font-family: 'Patrick Hand', cursive; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    input[type="date"] { min-height: 44px; }
    button { min-height: 44px; }
    /* Never keep a tilt while someone is typing inside a rotated card */
    .untilt-focus:focus-within { transform: rotate(0deg) !important; }
    /* Pulsing starburst seal (recovery fund hero) */
    @keyframes seal-pop { 0%, 100% { transform: rotate(-8deg) scale(1); } 50% { transform: rotate(-8deg) scale(1.06); } }
    @keyframes seal-ring { 0% { transform: scale(.9); opacity: .55; } 100% { transform: scale(1.5); opacity: 0; } }
    /* Visible keyboard focus everywhere, even where outline-none is used for pointer users */
    :is(button, input, select, textarea, a, summary):focus-visible { outline: 2px solid #3A2E25 !important; outline-offset: 2px; }
    /* Respect reduced-motion preferences */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
    /* Touch devices always get full-size targets, even where desktop uses compact inputs */
    @media (pointer: coarse) {
      input, button, select { min-height: 44px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Google Sheets Configuration
    const GSHEET_CONFIG = {
      sheetId: '172vcvsfg_-9OUxfkpTjjjQ2geu08GvDEE0vZGjbmJGI',
      publishedCsvBase: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSAbQAtv05Q_XPpRxi5G80VzDCCPYbZLnWnlZ7rA3oYGhx0wf44gr_hlO4o4yDrLhmL2-hdwPYaX6he/pub',
      editUrl: 'https://docs.google.com/spreadsheets/d/172vcvsfg_-9OUxfkpTjjjQ2geu08GvDEE0vZGjbmJGI/edit',
      copterSummaryGid: '1725162234'
    };

    const DEFAULT_MEDICATIONS = [
      { id: 'nexgard', name: 'Nexgard', interval: 30, icon: '💊' },
      { id: 'drontal', name: 'Drontal', interval: 90, icon: '💉' }
    ];

    const AVAILABLE_ICONS = ['💊', '💉', '🩺', '🏥', '💪', '🩹', '🧴', '🐾', '❤️', '⭐'];

    // Read-only itemized breakdowns of Mootoo's vet receipts (Family Pet
    // Hospital, Chiang Mai). Shown as receipt cards in the Donations tab,
    // newest first; independent of the Vet Cost total. `vat` is the exact
    // VAT from the paper receipt (a computed 7% can drift by a satang).
    const VET_COST_BREAKDOWNS = [
      // OPD check-up — 14 Jul 2026, Receipt/Tax Invoice FP-RO 01/1113-140769.
      // Subtotal ฿3,045.29 + VAT ฿213.16 = ฿3,258.45 net.
      {
        header: 'Receipt FP-RO 01/1113 · 14 Jul 2026',
        vatRate: 7,
        vat: 213.16,
        items: [
          { icon: '🧪', label: 'Laboratory tests', amount: 1514.00 },
          { icon: '💉', label: 'Injection & IV nutrition', amount: 700.95 },
          { icon: '💊', label: 'Medicine', amount: 523.32 },
          { icon: '👨‍⚕️', label: 'Doctor fee', amount: 140.19 },
          { icon: '👩‍⚕️', label: 'Nursing service', amount: 74.77 },
          { icon: '🏥', label: 'OPD service', amount: 50.00 },
          { icon: '🩹', label: 'Medical supplies', amount: 42.06 },
        ],
      },
      // Hospitalization — 6 Jul 2026, Receipt/Tax Invoice FP-RI 01/66-060769.
      // Subtotal ฿15,093.55 + VAT ฿1,056.56 = ฿16,150.11 grand total.
      {
        header: 'Receipt FP-RI 01/66 · 6 Jul 2026',
        vatRate: 7,
        vat: 1056.56,
        items: [
          { icon: '💉', label: 'IV fluids & injections', amount: 3654.25 },
          { icon: '🧪', label: 'Laboratory tests', amount: 3401.82 },
          { icon: '🛏️', label: 'Hospitalization (8 days)', amount: 1869.20 },
          { icon: '💊', label: 'Medication', amount: 1322.45 },
          { icon: '🩺', label: 'Medical procedures', amount: 1308.39 },
          { icon: '👨‍⚕️', label: 'Doctor fee', amount: 1121.52 },
          { icon: '🩹', label: 'Medical supplies', amount: 827.11 },
          { icon: '🔧', label: 'Medical equipment', amount: 785.05 },
          { icon: '👩‍⚕️', label: 'Nursing care', amount: 598.16 },
          { icon: '🍖', label: 'Food & supplements', amount: 205.60 },
        ],
      },
    ];

    // Default Google Apps Script Web App URL (public "Anyone" access — syncs without sign-in)
    const DEFAULT_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxaMGxWslhXYVAbTZihKLAGvTpb3ss49i_FSmuU2zBMgRVeqLbB-g8UjXeUZjp5MXKz/exec';

    // ——— Scrapbook design tokens (styling only) ———
    const UI = {
      card: "bg-white border-2 border-[#3A2E25] rounded-[14px] shadow-[4px_5px_0_rgba(58,46,37,0.18)]",
      btnGreen: "bg-[#35794C] hover:bg-[#2C6740] border-2 border-[#3A2E25] text-white rounded-[10px] px-4 py-[7px] font-hand text-base shadow-[2px_2px_0_rgba(58,46,37,0.3)] transition-all",
      btnWhite: "bg-white hover:bg-[#F6EFE3] border-2 border-[#3A2E25] text-[#3A2E25] rounded-[10px] px-4 py-[7px] font-hand text-base shadow-[2px_2px_0_rgba(58,46,37,0.3)] transition-all",
      btnSmall: "bg-white hover:bg-[#FFD966] border-2 border-[#3A2E25] text-[#3A2E25] rounded-lg px-3.5 py-1.5 font-hand text-[15px] shadow-[2px_2px_0_rgba(58,46,37,0.25)] transition-all",
      pill: "text-white rounded-full px-3 py-[3px] text-xs font-black whitespace-nowrap",
    };

    // Mootoo update statuses → condition sticker colors (scrapbook tints)
    const UPDATE_STATUSES = {
      recovering: { label: 'Recovering 🐾', bg: '#E9F5E4', border: '#3E8E5A', text: '#2F7A4D' },
      healthy:    { label: 'Healthy 🎉',    bg: '#E9F5E4', border: '#3E8E5A', text: '#2F7A4D' },
      care:       { label: 'Under care 💊', bg: '#FDF8EA', border: '#E0A93E', text: '#A87717' },
      critical:   { label: 'Critical 🏥',   bg: '#FDF1F4', border: '#C74C6B', text: '#B84A67' },
    };
    const UPDATE_ICONS = ['🐾', '🍚', '🏠', '🏥', '💊', '🩺', '🎉', '😴', '❤️'];

    // Decorative "tape" strip pinned to card tops (visual only)
    const Tape = ({ blue, rot }) => (
      <div style={{ position: 'absolute', top: -13, left: '50%', transform: `translateX(-50%) rotate(${rot || -2}deg)`,
        background: blue ? 'rgba(178,216,247,.85)' : 'rgba(255,217,102,.85)',
        border: '1px solid rgba(58,46,37,.2)', width: 110, height: 26, borderRadius: 3 }} />
    );

    const App = () => {
      const [dogs, setDogs] = useState([]);
      const [bills, setBills] = useState([]);
      const [donations, setDonations] = useState([]);
      const [vetCosts, setVetCosts] = useState([]);
      const [updates, setUpdates] = useState([]);
      const [medications, setMedications] = useState(DEFAULT_MEDICATIONS);
      const [companyInfo, setCompanyInfo] = useState({ name: '', address: '', email: '' });
      const [activeTab, setActiveTab] = useState('donations');
      const [userName, setUserName] = useState(() => localStorage.getItem('dogTracker_userName') || '');
      const [showNamePrompt, setShowNamePrompt] = useState(false);
      const [activityLog, setActivityLog] = useState([]);
      const [syncStatus, setSyncStatus] = useState('local'); // 'local' | 'syncing' | 'synced' | 'error'
      const [lastSync, setLastSync] = useState(null);
      const [appsScriptUrl, setAppsScriptUrl] = useState(() => {
        const stored = localStorage.getItem('dogLog_appsScriptUrl');
        // Migrate the old Workspace-restricted URL (/a/macros/buzzwoo.de/) to the public default
        if (!stored || stored.includes('/a/macros/')) return DEFAULT_APPS_SCRIPT_URL;
        return stored;
      });
      const [showSyncPanel, setShowSyncPanel] = useState(false);
      const [copterData, setCopterData] = useState([]);
      const [copterLoading, setCopterLoading] = useState(false);
      const [showScanner, setShowScanner] = useState(false);
      const [isScanning, setIsScanning] = useState(false);
      const [scanPreview, setScanPreview] = useState(null);
      const [scannedItems, setScannedItems] = useState([]);
      const [errorMessage, setErrorMessage] = useState('');
      const [showMedSettings, setShowMedSettings] = useState(false);
      const [newMed, setNewMed] = useState({ name: '', interval: 30, icon: '💊' });
      const [slackWebhook, setSlackWebhook] = useState(() => localStorage.getItem('dogLog_slackWebhook') || '');
      const [showSlackSettings, setShowSlackSettings] = useState(false);
      const [slackStatus, setSlackStatus] = useState('');

      // Employee info for Cash Advance Form
      const [employeeInfo, setEmployeeInfo] = useState(() => {
        const saved = localStorage.getItem('dogLog_employeeInfo');
        return saved ? JSON.parse(saved) : { name: '', position: '', team: '', department: '', bankName: '', accountName: 'Saralee Lakphan', accountNo: '', promptpay: '1500900086631' };
      });
      const [showEmployeeSettings, setShowEmployeeSettings] = useState(false);
      const [showCashAdvancePrompt, setShowCashAdvancePrompt] = useState(false);
      const [pendingCashAdvanceItems, setPendingCashAdvanceItems] = useState([]);
      const [viewingInvoiceImage, setViewingInvoiceImage] = useState(null);

      const saveTimeoutRef = useRef(null);
      const syncTimeoutRef = useRef(null);
      const isLoadingRef = useRef(false);
      // Guard: never PUSH to the sheet until we've successfully PULLED from it once.
      // Prevents a device with stale local data from overwriting the sheet on load.
      const hasSyncedRef = useRef(false);
      // Baseline record counts from the last confirmed-good sheet state, used to
      // block a catastrophic write that would wipe most of the data.
      const lastGoodCountsRef = useRef(null);
      const recordCounts = (o) => (o.dogs ? o.dogs.length : 0) + (o.bills ? o.bills.length : 0) + (o.donations ? o.donations.length : 0) + (o.vetCosts ? o.vetCosts.length : 0);
      const today = new Date();

      // CSV Parser for Google Sheets published data
      const parseCSV = (csv) => {
        const lines = csv.split('\n');
        if (lines.length < 1) return [];
        // Parse header
        const headerLine = lines[0];
        const headers = [];
        let current = '', inQuotes = false;
        for (const char of headerLine) {
          if (char === '"') { inQuotes = !inQuotes; }
          else if (char === ',' && !inQuotes) { headers.push(current.trim()); current = ''; }
          else { current += char; }
        }
        headers.push(current.trim());

        const rows = [];
        for (let i = 1; i < lines.length; i++) {
          if (!lines[i].trim()) continue;
          const values = [];
          let val = '', inQ = false;
          for (const ch of lines[i]) {
            if (ch === '"') { inQ = !inQ; }
            else if (ch === ',' && !inQ) { values.push(val.trim()); val = ''; }
            else { val += ch; }
          }
          values.push(val.trim());
          const row = {};
          headers.forEach((h, idx) => { row[h] = (values[idx] || '').trim(); });
          rows.push(row);
        }
        return rows;
      };

      // Normalize date strings from Google Sheets (e.g. "Thu Feb 05 2026 00:00:00 GMT+0700..." → "2026-02-05")
      const normalizeDate = (dateStr) => {
        if (!dateStr) return '';
        // Already YYYY-MM-DD format
        if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
        // Try parsing as Date
        const d = new Date(dateStr);
        if (!isNaN(d.getTime())) {
          return d.toISOString().split('T')[0];
        }
        return dateStr;
      };

      // Fix dog medication dates after reading from sheet
      const normalizeDogDates = (dog) => {
        const fixed = { ...dog };
        Object.keys(fixed).forEach(key => {
          if (fixed[key] && typeof fixed[key] === 'object' && fixed[key].lastGiven) {
            fixed[key] = { ...fixed[key], lastGiven: normalizeDate(fixed[key].lastGiven) };
          }
        });
        return fixed;
      };

      // Sync FROM Google Sheets (via Apps Script)
      const syncFromSheets = async () => {
        if (!appsScriptUrl) { setErrorMessage('Set Apps Script URL first'); return; }
        setSyncStatus('syncing');
        try {
          const res = await fetch(appsScriptUrl);
          if (!res.ok) throw new Error('Failed to fetch from Apps Script');
          const data = await res.json();

          // Only update if sheet actually has data (don't overwrite local data with empty sheets)
          const hasSheetData = (data.dogs && data.dogs.length > 0) || (data.bills && data.bills.length > 0) || (data.medications && data.medications.length > 0);
          if (!hasSheetData) {
            console.log('Sheet is empty, keeping local data');
            hasSyncedRef.current = true; // pulled successfully (sheet just happens to be empty)
            setSyncStatus('synced');
            setErrorMessage('');
            return;
          }

          isLoadingRef.current = true;
          // Normalize dates from sheet format
          if (data.dogs && data.dogs.length > 0) setDogs(data.dogs.map(normalizeDogDates));
          if (data.bills && data.bills.length > 0) setBills(data.bills.map(b => ({ ...b, dueDate: normalizeDate(b.dueDate) })));
          if (data.donations && data.donations.length > 0) setDonations(data.donations.map(d => ({ ...d, date: normalizeDate(d.date) })));
          if (data.vetCosts && data.vetCosts.length > 0) {
            setVetCosts(data.vetCosts.map(v => ({ ...v, date: normalizeDate(v.date) })));
          } else if (data.companyInfo && data.companyInfo.mootooVetCost) {
            // Legacy migration: single vet cost value → one dated entry
            setVetCosts([{ id: Date.now(), description: 'Vet cost', amount: data.companyInfo.mootooVetCost, date: '' }]);
          }
          if (data.updates && data.updates.length > 0) setUpdates(data.updates.map(u => ({ ...u, date: normalizeDate(u.date) })));
          if (data.medications && data.medications.length > 0) setMedications(data.medications);
          if (data.companyInfo && (data.companyInfo.name || data.companyInfo.mootooVetCost)) setCompanyInfo(data.companyInfo);
          if (data.activityLog && data.activityLog.length > 0) setActivityLog(data.activityLog);

          hasSyncedRef.current = true; // pulled real data successfully — pushes are now allowed
          lastGoodCountsRef.current = recordCounts(data); // baseline for the destructive-write guard
          setLastSync(new Date());
          setSyncStatus('synced');
          setErrorMessage('');
          localStorage.setItem('dogLog_backup', JSON.stringify(data));
          setTimeout(() => { isLoadingRef.current = false; }, 100);
        } catch (err) {
          console.error('Sync from sheets error:', err);
          setSyncStatus('error');
          setErrorMessage(err.message);
        }
      };

      // Sync TO Google Sheets (via Apps Script)
      const saveToSheets = async () => {
        if (!appsScriptUrl || isLoadingRef.current) return;
        const payload = { dogs, bills, donations, vetCosts, updates, medications, companyInfo, activityLog };
        // Defense-in-depth: refuse to overwrite the sheet with a drastically smaller
        // dataset (the signature of the corruption that wiped everything).
        const prevCount = lastGoodCountsRef.current;
        const nextCount = recordCounts(payload);
        if (prevCount !== null && prevCount >= 8 && nextCount < prevCount * 0.5) {
          console.warn('saveToSheets: blocked a destructive write', { prevCount, nextCount });
          setSyncStatus('error');
          setErrorMessage('Sync paused — refused to replace sheet data (' + prevCount + ' records) with a much smaller set (' + nextCount + '). Reload to re-sync from the sheet.');
          return;
        }
        try {
          await fetch(appsScriptUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(payload)
          });
          lastGoodCountsRef.current = nextCount;
          setLastSync(new Date());
          setSyncStatus('synced');
          localStorage.setItem('dogLog_backup', JSON.stringify(payload));
        } catch (err) {
          console.error('Save to sheets error:', err);
          // Don't set error status for write failures, just log
        }
      };

      // Export data as .xlsx file (backup / manual import to sheets)
      const exportToExcel = () => {
        const wb = XLSX.utils.book_new();
        // Dogs sheet
        const dogsHeaders = ['ID', 'Name'];
        medications.forEach(med => { dogsHeaders.push(med.id + '_Last', med.id + '_By'); });
        const dogsData = dogs.map(d => {
          const row = { ID: d.id, Name: d.name };
          medications.forEach(med => {
            row[med.id + '_Last'] = d[med.id]?.lastGiven || '';
            row[med.id + '_By'] = d[med.id]?.givenBy || '';
          });
          return row;
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dogsData.length ? dogsData : [{}], { header: dogsHeaders }), 'Dogs');
        // Bills sheet
        const billsData = bills.map(b => ({ ID: b.id, Description: b.description, Amount: b.amount, DueDate: b.dueDate, Paid: b.paid ? 'Yes' : 'No' }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(billsData.length ? billsData : [{ ID: '', Description: '', Amount: '', DueDate: '', Paid: '' }]), 'Bills');
        // Donations sheet
        const donationsData = donations.map(d => ({ ID: d.id, Donor: d.donor, Amount: d.amount, Date: d.date }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(donationsData.length ? donationsData : [{ ID: '', Donor: '', Amount: '', Date: '' }]), 'Donations');
        // VetCosts sheet
        const vetCostsData = vetCosts.map(v => ({ ID: v.id, Description: v.description, Amount: v.amount, Date: v.date }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(vetCostsData.length ? vetCostsData : [{ ID: '', Description: '', Amount: '', Date: '' }]), 'VetCosts');
        // Updates sheet
        const updatesData = updates.map(u => ({ ID: u.id, Date: u.date, Icon: u.icon, Title: u.title, Note: u.note, Author: u.author, Status: u.status }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(updatesData.length ? updatesData : [{ ID: '', Date: '', Icon: '', Title: '', Note: '', Author: '', Status: '' }]), 'Updates');
        // Medications sheet
        const medsData = medications.map(m => ({ ID: m.id, Name: m.name, Interval: m.interval, Icon: m.icon }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(medsData), 'Medications');
        // Company sheet
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([{ Name: companyInfo.name, Address: companyInfo.address, Email: companyInfo.email, MootooVetCost: companyInfo.mootooVetCost || '' }]), 'Company');
        // ActivityLog sheet
        const logData = activityLog.map(l => ({ User: l.user, Action: l.action, Details: l.details, Time: l.time }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(logData.length ? logData : [{ User: '', Action: '', Details: '', Time: '' }]), 'ActivityLog');
        XLSX.writeFile(wb, `dog-log-backup-${new Date().toISOString().split('T')[0]}.xlsx`);
        logActivity('exported data', 'to Excel');
      };

      // Load Copter historical data from published CSV (summary tab)
      const loadCopterData = async () => {
        setCopterLoading(true);
        try {
          const res = await fetch(`${GSHEET_CONFIG.publishedCsvBase}?output=csv&gid=${GSHEET_CONFIG.copterSummaryGid}`);
          if (!res.ok) throw new Error('Failed to fetch Copter data');
          const csv = await res.text();
          const rows = parseCSV(csv);
          setCopterData(rows);
        } catch (err) {
          console.error('Copter data error:', err);
        }
        setCopterLoading(false);
      };

      // One-time migration: seed data from old Firebase backup
      // Initial load: read localStorage for a fast first paint, then always
      // reconcile with the Google Sheet, which is the source of truth. The
      // hasSyncedRef guard ensures we never push local data up before this
      // pull confirms the sheet's contents (prevents stale-data overwrites).
      // NOTE: the old FIREBASE_SEED_DATA one-time migration seed was removed —
      // it was obsolete and could resurrect ancient data over live records.
      useEffect(() => {
        const backup = localStorage.getItem('dogLog_backup');
        let hasLocalData = false;
        if (backup) {
          try {
            const data = JSON.parse(backup);
            hasLocalData = data.dogs && data.dogs.length > 0;
            if (hasLocalData) loadFromLocalStorage();
          } catch (e) {}
        }
        if (appsScriptUrl) {
          setTimeout(() => syncFromSheets(), hasLocalData ? 1000 : 500);
        }
      }, []);

      const loadFromLocalStorage = () => {
        const backup = localStorage.getItem('dogLog_backup');
        if (backup) {
          try {
            const data = JSON.parse(backup);
            if (data.dogs) setDogs(data.dogs);
            if (data.bills) setBills(data.bills);
            if (data.donations) setDonations(data.donations);
            if (data.vetCosts) setVetCosts(data.vetCosts);
            else if (data.companyInfo?.mootooVetCost) setVetCosts([{ id: Date.now(), description: 'Vet cost', amount: data.companyInfo.mootooVetCost, date: '' }]);
            if (data.updates) setUpdates(data.updates);
            if (data.medications) setMedications(data.medications);
            if (data.companyInfo) setCompanyInfo(data.companyInfo);
            if (data.activityLog) setActivityLog(data.activityLog);
          } catch (e) {}
        }
      };

      // Auto-save to localStorage + sync to Google Sheets
      useEffect(() => {
        if (isLoadingRef.current) return;
        if (dogs.length === 0 && bills.length === 0 && medications.length === DEFAULT_MEDICATIONS.length) return;
        if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
        saveTimeoutRef.current = setTimeout(() => {
          localStorage.setItem('dogLog_backup', JSON.stringify({ dogs, bills, donations, vetCosts, updates, medications, companyInfo, activityLog }));
          // Only push to the sheet once we've confirmed its contents via an initial pull.
          if (appsScriptUrl && hasSyncedRef.current) saveToSheets();
        }, 1000);
      }, [dogs, bills, donations, vetCosts, updates, medications, companyInfo, activityLog]);

      // Save Apps Script URL to localStorage
      useEffect(() => {

      // Invoice parsing patterns for Thai invoices
      const INVOICE_PATTERNS = {
        // Keywords that START the product table area
        tableStartKeywords: ['รายการสั่งซื้อ', 'สินค้า', 'product', 'รายการ', 'description'],
        // Keywords that END the product table area (summary section)
        tableEndKeywords: ['มูลค่าสินค้ารวม', 'product price total', 'รวมทั้งหมด', 'ยอดรวม', 'all total', 'grand total', 'subtotal'],
        // Keywords to always skip

        // Product indicators - lines with these are likely products
        productIndicators: ['kg', 'ml', 'กก', 'กรัม', 'ชิ้น', 'แพ็ค', 'กล่อง', 'ขวด', 'เม็ด', 'dog', 'cat', 'shampoo', 'spt', 'dron', 'natural'],

      const parseThaiInvoice = (text) => {
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        const items = [];
        const seenAmounts = new Set();

        // Price pattern: must have .00 decimal (Thai invoice standard)
        const pricePattern = /(\d{1,3}(?:,\d{3})*\.\d{2})/g;

        // Find the product table boundaries
        let inProductTable = false;
        let tableStartIndex = -1;
        let tableEndIndex = lines.length;

        for (let i = 0; i < lines.length; i++) {
          const lineLower = lines[i].toLowerCase();

          // Check for table start
          if (!inProductTable && INVOICE_PATTERNS.tableStartKeywords.some(kw => lineLower.includes(kw.toLowerCase()))) {
            // Look for header row with price/unit columns
            if (lineLower.includes('ราคา') || lineLower.includes('price') || lineLower.includes('total') || lineLower.includes('รวม')) {
              inProductTable = true;
              tableStartIndex = i + 1; // Start after header
              console.log('Table starts at line:', i, lines[i]);
            }
          }

          // Check for table end
          if (inProductTable && INVOICE_PATTERNS.tableEndKeywords.some(kw => lineLower.includes(kw.toLowerCase()))) {
            tableEndIndex = i;
            console.log('Table ends at line:', i, lines[i]);
            break;
          }
        }

        console.log('Product table range:', tableStartIndex, 'to', tableEndIndex);

        // If we didn't find clear boundaries, try to find product lines by indicators
        if (tableStartIndex === -1) {
          tableStartIndex = 0;
          console.log('No clear table start found, scanning all lines with product indicators');
        }

        // Parse only lines within the product table
        for (let i = tableStartIndex; i < tableEndIndex; i++) {
          const originalLine = lines[i];
          const lineLower = originalLine.toLowerCase();

          // Skip if line contains skip keywords
          if (INVOICE_PATTERNS.skipKeywords.some(kw => lineLower.includes(kw.toLowerCase()))) {
            continue;
          }

          // Find prices in this line
          const priceMatches = originalLine.match(pricePattern);
          if (!priceMatches || priceMatches.length === 0) continue;

          // Check if line has product indicators OR has multiple price columns (unit price + total)
          const hasProductIndicator = INVOICE_PATTERNS.productIndicators.some(kw => lineLower.includes(kw.toLowerCase()));
          const hasMultiplePrices = priceMatches.length >= 2;

          // Only process if it looks like a product line
          if (!hasProductIndicator && !hasMultiplePrices) {
            console.log('Skipping non-product line:', originalLine);
            continue;
          }

          // Get prices as numbers
          const prices = priceMatches.map(m => parseFloat(m.replace(/,/g, ''))).filter(p => p >= 50 && p < 50000);

          if (prices.length === 0) continue;

          // For product lines with format: Description | Unit Price | Qty | Total
          // We want the LAST price (Total column)
          const amount = prices[prices.length - 1];

          // Skip duplicate amounts
          const amountKey = amount.toFixed(2);
          if (seenAmounts.has(amountKey)) continue;
          seenAmounts.add(amountKey);

          // Extract description
          let description = originalLine
            .replace(pricePattern, '')  // Remove prices
            .replace(/[฿$]/g, '')       // Remove currency symbols
            .replace(/^\d+[\.\s]*/g, '') // Remove leading item numbers like "1." or "1 "
            .replace(/\s+/g, ' ')        // Normalize spaces
            .trim();

          // If description is too short, check adjacent lines
          if (description.length < 5 && i > 0) {
            const prevLine = lines[i - 1];
            if (!pricePattern.test(prevLine) && prevLine.length > 3) {
              description = prevLine.trim() + ' ' + description;
            }
          }

          // Truncate long descriptions
          if (description.length > 60) {
            description = description.substring(0, 60).trim() + '...';
          }

          if (description.length >= 3) {
            items.push({
              id: Date.now() + Math.random(),
              description: description || 'Item',
              amount,
              selected: true
            });
            console.log('Found product:', description, '→', amount);
          }
        }

        return items;
      };

      // Image pre-processing for better OCR
      const preprocessImage = (imageSrc) => {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // Scale up for better OCR (2x)
            const scale = 2;
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;

            // Draw scaled image
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            // Get image data for processing
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // Convert to grayscale and increase contrast
            for (let i = 0; i < data.length; i += 4) {
              // Grayscale
              const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];

              // Increase contrast (factor of 1.5)
              const contrast = 1.5;
              const factor = (259 * (contrast * 100 + 255)) / (255 * (259 - contrast * 100));
              let newGray = factor * (gray - 128) + 128;

              // Threshold to make text sharper (binarization)
              // Values below 180 become black, above become white
              newGray = newGray < 180 ? 0 : 255;

              data[i] = newGray;     // R
              data[i + 1] = newGray; // G
              data[i + 2] = newGray; // B
              // Alpha stays the same
            }

            ctx.putImageData(imageData, 0, 0);
            resolve(canvas.toDataURL('image/png'));
          };
          img.src = imageSrc;
        });

                      setShowCashAdvancePrompt(false);
                    }
                  }} className={`flex-1 ${UI.btnGreen}`}>✓ save</button>
                </div>
              </div>
            </div>
          )}

          {/* Cash Advance Prompt Modal */}
          {showCashAdvancePrompt && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
              <div className={`${UI.card} p-5 w-full max-w-lg max-h-[90vh] overflow-y-auto`}>
                <div className="text-center mb-4">
                  <div className="text-4xl mb-2">📄</div>
                  <h3 className="font-hand text-2xl text-[#3A2E25]">Generate cash advance form?</h3>
                </div>
                <p className="text-[#6E5A42] text-sm font-semibold text-center mb-3">Bills added! Select items for the form:</p>
                <div className="mb-4">
                  <div className="flex justify-between items-center mb-2">
                    <span className="text-sm font-bold text-[#6E5A42]">{pendingCashAdvanceItems.filter(i => i.selected !== false).length} of {pendingCashAdvanceItems.length} selected</span>
                    <div className="flex gap-2">
                      <button onClick={selectAllCashAdvanceItems} className="px-2 py-1 font-hand text-sm bg-white border-[1.5px] border-[#C9B79E] hover:border-[#3A2E25] text-[#6E5A42] hover:text-[#3A2E25] rounded-lg transition-all">select all</button>
                      <button onClick={unselectAllCashAdvanceItems} className="px-2 py-1 font-hand text-sm bg-white border-[1.5px] border-[#C9B79E] hover:border-[#3A2E25] text-[#6E5A42] hover:text-[#3A2E25] rounded-lg transition-all">unselect all</button>
                    </div>
                  </div>
                  <div className="space-y-2 max-h-48 overflow-y-auto border-[1.5px] border-dashed border-[#C9B79E] rounded-[10px] p-2">
                    {pendingCashAdvanceItems.map(item => (
                      <div key={item.id} className={`flex items-center gap-2 p-2 rounded-[10px] border-2 ${item.selected !== false ? 'bg-[#F4FAF1] border-[#CBE5C0]' : 'bg-[#FBF8F0] border-[#D9CBB4]'}`}>
                        <button onClick={() => toggleCashAdvanceItem(item.id)} aria-label={item.selected !== false ? 'Unselect item' : 'Select item'} className={`w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 font-black text-xs ${item.selected !== false ? 'bg-[#35794C] border-[#35794C] text-white' : 'bg-white border-[#3A2E25]'}`}>{item.selected !== false && '✓'}</button>
                        <span className="flex-1 text-sm font-bold text-[#3A2E25] truncate">{item.description || 'Item'}</span>
                        <span className="font-hand text-base text-[#B84A67]">฿{parseFloat(item.amount).toLocaleString()}</span>
                      </div>
                    ))}
                  </div>
                  <div className="text-right mt-2 font-hand text-lg text-[#3A2E25]">
                    total <span className="text-[#B84A67]">฿{pendingCashAdvanceItems.filter(i => i.selected !== false).reduce((s, i) => s + (parseFloat(i.amount) || 0), 0).toLocaleString()}</span>
                  </div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => handleCashAdvanceResponse(false)} className={`flex-1 ${UI.btnWhite}`}>no, just bills</button>
                  <button onClick={() => handleCashAdvanceResponse(true)} disabled={!pendingCashAdvanceItems.some(i => i.selected !== false)} className={`flex-1 ${UI.btnGreen} disabled:opacity-50`}>
                    📋 generate excel ({pendingCashAdvanceItems.filter(i => i.selected !== false).length})
                  </button>
                </div>
                <button onClick={() => setShowEmployeeSettings(true)} className="w-full mt-3 font-hand text-base text-[#B98A4A] hover:text-[#3A2E25] hover:underline bg-transparent">✎ edit employee info</button>
              </div>
            </div>
          )}

          {/* Invoice Image Viewer Modal */}
          {viewingInvoiceImage && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4" onClick={() => setViewingInvoiceImage(null)}>
              <div className="relative max-w-4xl max-h-[90vh]" onClick={e => e.stopPropagation()}>
                <button
                  onClick={() => setViewingInvoiceImage(null)}
                  aria-label="Close invoice image"
                  className="absolute -top-3 -right-3 w-10 h-10 bg-white border-2 border-[#3A2E25] rounded-full shadow-[2px_2px_0_rgba(58,46,37,0.25)] flex items-center justify-center text-xl z-10 text-[#3A2E25]"
                >
                  ×
                </button>
                <img
                  src={viewingInvoiceImage}
                  alt="Invoice"
                  className="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl"
                />
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
